<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;padding:18px;display:flex;justify-content:center;background:transparent">
<div class="scr4"><style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

.scr4 * { box-sizing: border-box; margin: 0; padding: 0; }

.scr4 figure.ph {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-family: 'Nunito', sans-serif;
}

.scr4 figcaption {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: #555;
  letter-spacing: .5px;
}

.scr4 .screen {
  width: 300px;
  height: 640px;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(circle at 50% 42%, #1A6FC0 0%, rgba(26,111,192,0) 34%),
    repeating-conic-gradient(from -90deg at 50% 42%, #52A6E0 0deg 11.25deg, #0F478C 11.25deg 22.5deg),
    #0F478C;
  box-shadow: 0 24px 60px rgba(0,0,0,.45), 0 4px 12px rgba(0,0,0,.3);
}

.scr4 .screen::before {
  content: '';
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 6px;
  background: rgba(255,255,255,.35);
  border-radius: 3px;
  z-index: 100;
}

/* ---- BACK BAR ---- */
.scr4 .back-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 28px 16px 8px;
  background: rgba(0,0,0,.12);
}

.scr4 .back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.32);
  border-radius: 20px;
  padding: 4px 10px 4px 7px;
  cursor: pointer;
  backdrop-filter: blur(6px);
}

.scr4 .back-btn span {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: #fff;
}

.scr4 .back-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 15px;
  color: #fff;
  flex: 1;
  text-align: center;
  margin-right: 36px;
  letter-spacing: .3px;
  text-shadow: 0 1px 4px rgba(0,0,0,.3);
}

/* ---- SEARCH BAR ---- */
.scr4 .search-wrap {
  flex-shrink: 0;
  padding: 6px 14px 8px;
}

.scr4 .search-box {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 14px;
  padding: 6px 12px;
  backdrop-filter: blur(8px);
}

.scr4 .search-box span {
  font-size: 13px;
}

.scr4 .search-box p {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: rgba(255,255,255,.6);
}

/* ---- GRID SCROLL ---- */
.scr4 .grid-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 2px 12px 10px;
  scrollbar-width: none;
}

.scr4 .grid-scroll::-webkit-scrollbar { display: none; }

.scr4 .grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 9px;
}

/* ---- CATEGORY TILE ---- */
.scr4 .tile {
  background: #FFF8EE;
  border-radius: 16px;
  padding: 12px 10px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,.15), 0 1px 3px rgba(0,0,0,.1);
  transition: transform .12s, box-shadow .12s;
  position: relative;
  border: 2px solid transparent;
}

.scr4 .tile:active {
  transform: scale(.96);
}

.scr4 .tile.selected {
  border-color: #FFC233;
  box-shadow: 0 0 0 3px rgba(255,194,51,.3), 0 3px 10px rgba(0,0,0,.15);
}

.scr4 .tile-icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  line-height: 1;
  flex-shrink: 0;
}

.scr4 .tile-name {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 12px;
  color: #1a1a2e;
  text-align: center;
  line-height: 1.2;
  letter-spacing: .2px;
}

.scr4 .tile-count {
  display: flex;
  align-items: center;
  gap: 3px;
  background: rgba(0,0,0,.06);
  border-radius: 20px;
  padding: 2px 8px;
}

.scr4 .tile-count span {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 11px;
  color: #555;
}

.scr4 .tile-count .cnt-num {
  color: #0F478C;
  font-weight: 900;
  font-size: 12px;
}

/* ---- WIDE TILE (span 2 cols) ---- */
.scr4 .tile.wide {
  grid-column: span 2;
  flex-direction: row;
  align-items: center;
  padding: 10px 16px;
  gap: 12px;
}

.scr4 .tile.wide .tile-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.scr4 .tile.wide .tile-name {
  text-align: left;
  font-size: 13px;
}

.scr4 .tile.wide .tile-count {
  align-self: flex-start;
}

/* ---- BADGE ARROW ---- */
.scr4 .tile-arrow {
  position: absolute;
  right: 9px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: #bbb;
}

/* ---- CATEGORY COLORS ---- */
.scr4 .cat-etude    { background: rgba(76,175,80,.18); }
.scr4 .cat-metier   { background: rgba(52,152,219,.18); }
.scr4 .cat-salaire  { background: rgba(229,161,0,.18); }
.scr4 .cat-flirt    { background: rgba(233,30,99,.18); }
.scr4 .cat-mariage  { background: rgba(233,30,99,.14); }
.scr4 .cat-enfant   { background: rgba(255,128,171,.20); }
.scr4 .cat-acqui    { background: rgba(141,110,99,.18); }
.scr4 .cat-distinc  { background: rgba(255,214,0,.22); }
.scr4 .cat-malus    { background: rgba(229,57,53,.18); }
.scr4 .cat-speciale { background: rgba(124,108,240,.18); }

.scr4 .ic-etude    { color: #4CAF50; }
.scr4 .ic-metier   { color: #3498DB; }
.scr4 .ic-salaire  { color: #E5A100; }
.scr4 .ic-flirt    { color: #E91E63; }
.scr4 .ic-mariage  { color: #E91E63; }
.scr4 .ic-enfant   { color: #FF80AB; }
.scr4 .ic-acqui    { color: #8D6E63; }
.scr4 .ic-distinc  { color: #E6B800; }
.scr4 .ic-malus    { color: #E53935; }
.scr4 .ic-speciale { color: #7C6CF0; }

/* ---- NAV BAR ---- */
.scr4 .nav-bar {
  flex-shrink: 0;
  background: #FFF8EE;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 8px 4px 16px;
  border-top: 1px solid rgba(0,0,0,.08);
  box-shadow: 0 -2px 10px rgba(0,0,0,.08);
}

.scr4 .nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  min-width: 40px;
}

.scr4 .nav-item .nav-icon { font-size: 18px; line-height: 1; }
.scr4 .nav-item .nav-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 9px;
  color: #aaa;
  letter-spacing: .3px;
}

.scr4 .nav-item.active .nav-label { color: #FFC233; }
.scr4 .nav-item.active .nav-icon  { filter: drop-shadow(0 0 3px rgba(255,194,51,.6)); }

.scr4 .nav-fab {
  width: 52px;
  height: 52px;
  border-radius: 26px;
  background: linear-gradient(160deg, #FFD15C, #FFC233, #E8A91E);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px rgba(255,194,51,.5), 0 2px 6px rgba(0,0,0,.2);
  cursor: pointer;
  margin-top: -20px;
  flex-shrink: 0;
}

.scr4 .nav-fab span { font-size: 22px; line-height: 1; }

/* ---- SECTION HEADER ---- */
.scr4 .section-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 10px;
  color: rgba(255,255,255,.55);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 0 2px 4px;
  margin-top: 4px;
}
</style>

<figure class="ph">
  <div class="screen">

    <!-- BACK BAR -->
    <div class="back-bar">
      <div class="back-btn">
        <span>‹</span>
      </div>
      <div class="back-title">Les cartes du jeu</div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-box">
        <span>🔍</span>
        <p>Rechercher une famille…</p>
      </div>
    </div>

    <!-- GRID -->
    <div class="grid-scroll">
      <p class="section-label">10 familles · 102 cartes</p>
      <div class="grid">

        <!-- Études -->
        <div class="tile">
          <div class="tile-icon-wrap cat-etude">
            <span class="ic-etude">📚</span>
          </div>
          <div class="tile-name">Études</div>
          <div class="tile-count">
            <span class="cnt-num">6</span>
            <span>cartes</span>
          </div>
        </div>

        <!-- Métiers -->
        <div class="tile">
          <div class="tile-icon-wrap cat-metier">

          </div>
          <div class="tile-name">Métiers</div>
          <div class="tile-count">
            <span class="cnt-num">18</span>
            <span>cartes</span>
          </div>
        </div>

        <!-- Salaires -->
        <div class="tile">
          <div class="tile-icon-wrap cat-salaire">
            <span class="ic-salaire">💵</span>
          </div>
          <div class="tile-name">Salaires</div>
          <div class="tile-count">
            <span class="cnt-num">12</span>
            <span>cartes</span>
          </div>
        </div>

        <!-- Flirts -->
        <div class="tile">
          <div class="tile-icon-wrap cat-flirt">
            <span class="ic-flirt">❤️</span>
          </div>
          <div class="tile-name">Flirts</div>
          <div class="tile-count">
            <span class="cnt-num">8</span>
            <span>cartes</span>
          </div>
        </div>

        <!-- Mariage -->
        <div class="tile">
          <div class="tile-icon-wrap cat-mariage">
            <span class="ic-mariage">💍</span>
          </div>
          <div class="tile-name">Mariage</div>
          <div class="tile-count">
            <span class="cnt-num">4</span>
            <span>cartes</span>
          </div>
        </div>

        <!-- Enfants -->
        <div class="tile">
          <div class="tile-icon-wrap cat-enfant">
            <span class="ic-enfant">👶</span>
          </div>
          <div class="tile-name">Enfants</div>
          <div class="tile-count">
            <span class="cnt-num">6</span>

          </div>
        </div>

        <!-- Acquisitions -->
        <div class="tile">
          <div class="tile-icon-wrap cat-acqui">

          </div>

          </div>
        </div>

        <!-- Distinctions -->
        <div class="tile">
          <div class="tile-icon-wrap cat-distinc">
            <span class="ic-distinc">🏆</span>
          </div>
          <div class="tile-name">Distinctions</div>
          <div class="tile-count">
            <span class="cnt-num">5</span>
            <span>cartes</span>
          </div>
        </div>

        <!-- Malus — wide -->
        <div class="tile wide">
          <div class="tile-icon-wrap cat-malus">
            <span class="ic-malus">⚠️</span>
          </div>
          <div class="tile-meta">
            <div class="tile-name">Malus</div>

              <span class="cnt-num">20</span>

            </div>

        <!-- Spéciales — wide -->
        <div class="tile wide selected">
          <div class="tile-icon-wrap cat-speciale">
            <span class="ic-speciale">✨</span>
          </div>
          <div class="tile-meta">
            <div class="tile-name">Spéciales</div>

              <span class="cnt-num">14</span>
              <span>cartes</span>
            </div>
          </div>

        </div>

      </div>
    </div>

    <!-- NAV BAR -->
    <div class="nav-bar">
      <div class="nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Accueil</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profil</span>
      </div>
      <div class="nav-fab">
        <span>▶</span>
      </div>
      <div class="nav-item active">
        <span class="nav-icon">📖</span>
        <span class="nav-label">Encyclo</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">🛍️</span>
        <span class="nav-label">Boutique</span>
      </div>
    </div>

  </div>
  <figcaption>Encyclopédie</figcaption>
</figure>
</div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
