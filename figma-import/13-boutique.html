<!DOCTYPE html>

<div class="scr3"><style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

.scr3 * { box-sizing: border-box; margin: 0; padding: 0; }

.scr3 figure.ph {
  display: inline-flex;

  align-items: center;

}

.scr3 .screen {

.scr3 .screen::before {
  content: '';

/* HEADER */
.scr3 .shop-header {

}

.scr3 .shop-title {

}

.scr3 .shop-balance {
  background: rgba(255,255,255,.18);
  border: 1.5px solid rgba(255,255,255,.35);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 800;
  color: #FFC233;

}

/* SCROLL ZONE */
.scr3 .shop-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 4px 12px 8px;

}
.scr3 .shop-scroll::-webkit-scrollbar { display: none; }

/* SECTION */
.scr3 .section {
  margin-bottom: 10px;
}

.scr3 .section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;

  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,.4);
  margin-bottom: 6px;

}

.scr3 .section-header::after {
  content: '';
  flex: 1;
  height: 1.5px;
  background: rgba(255,255,255,.25);

}

/* ITEM CARD */
.scr3 .item-card {
  background: #FFF8EE;
  border-radius: 14px;
  padding: 7px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

.scr3 .item-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
  flex: 1;
  min-width: 0;
}

.scr3 .item-name {
  font-size: 11px;
  font-weight: 800;
  color: #0F478C;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.scr3 .item-price {
  font-size: 10px;
  font-weight: 700;
  color: #E8A91E;
}

.scr3 .item-price.euro {
  color: #555;
}

/* BUY BUTTON */
.scr3 .btn-buy {
  background: linear-gradient(160deg, #FFD15C, #FFC233, #E8A91E);
  border: none;
  border-radius: 20px;
  padding: 5px 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 900;
  color: #0F478C;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(232,169,30,.45);
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 8px;
  letter-spacing: .2px;
}

.scr3 .btn-owned {
  background: #e0f4e8;
  border: 1.5px solid #4CAF50;
  border-radius: 20px;
  padding: 4px 9px;
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 900;
  color: #2e7d32;
  flex-shrink: 0;
  margin-left: 8px;
  white-space: nowrap;
}

/* SMILES RECHARGES — double item */
.scr3 .item-card.recharge {
  flex-direction: column;
  align-items: stretch;
  gap: 5px;
  padding: 7px 10px;
}

.scr3 .recharge-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.scr3 .recharge-label {
  font-size: 11px;
  font-weight: 800;
  color: #0F478C;
}

.scr3 .recharge-price {
  font-size: 10px;
  font-weight: 700;
  color: #555;
  margin-left: 6px;
}

/* ETHIQUE BADGE */
.scr3 .ethique-badge {
  margin: 4px 0 8px;
  background: rgba(76,175,80,.18);
  border: 1.5px solid rgba(76,175,80,.45);
  border-radius: 10px;
  padding: 4px 10px;
  font-size: 9.5px;
  font-weight: 800;
  color: #fff;
  text-align: center;
  letter-spacing: .2px;
}

/* NAV BAR */
.scr3 .nav-bar {
  flex-shrink: 0;
  background: #FFF8EE;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  border-top: 1px solid rgba(0,0,0,.08);
  padding: 0 4px;
  position: relative;
}

.scr3 .nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex: 1;
  cursor: pointer;
}

.scr3 .nav-icon {
  font-size: 18px;
  line-height: 1;
}

.scr3 .nav-label {
  font-size: 8.5px;
  font-weight: 800;
  color: #aaa;
  letter-spacing: .2px;
}

.scr3 .nav-item.active .nav-icon { filter: none; }
.scr3 .nav-item.active .nav-label { color: #FFC233; }

.scr3 .nav-fab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex: 1;
  cursor: pointer;
}

.scr3 .nav-fab-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(160deg, #FFD15C, #FFC233, #E8A91E);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  margin-top: -14px;
  box-shadow: 0 3px 12px rgba(232,169,30,.55);
}

.scr3 .nav-fab-label {
  font-size: 8.5px;
  font-weight: 800;
  color: #aaa;
  letter-spacing: .2px;
  margin-top: 1px;
}
</style>

<figure class="ph">
  <div class="screen">

    <!-- SCROLLABLE CONTENT -->

      <!-- BADGE ETHIQUE -->
      <div class="ethique-badge">✅ 100 % cosmétique · Jamais de pay-to-win</div>

      <!-- 1. DOS DE CARTES -->
      <div class="section">

        <div class="item-card">

      <div class="section">

  </div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
