<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;padding:18px;display:flex;justify-content:center;background:transparent">
<div class="scr0"><style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

.scr0 * { box-sizing: border-box; margin: 0; padding: 0; }

.scr0 figure.ph {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  font-family: 'Nunito', sans-serif;
}

.scr0 figure.ph figcaption {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: #444;
  letter-spacing: .3px;
}

.scr0 .screen {
  width: 300px;
  height: 640px;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(circle at 50% 42%, #1A6FC0 0%, rgba(26,111,192,0) 34%),
    repeating-conic-gradient(from -90deg at 50% 42%, #52A6E0 0deg 11.25deg, #0F478C 11.25deg 22.5deg),
    #0F478C;
  font-family: 'Nunito', sans-serif;
}

/* Encoche */
.scr0 .screen::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 90px; height: 22px;
  background: rgba(0,0,0,.55);
  border-radius: 0 0 16px 16px;
  z-index: 99;
}

/* Barre de retour */
.scr0 .topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 30px 16px 10px;
}

.scr0 .topbar-back {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  border: 1.5px solid rgba(255,255,255,.35);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 16px;
  font-weight: 900;
  flex-shrink: 0;
  cursor: pointer;
}

.scr0 .topbar-title {
  font-weight: 900;
  font-size: 16px;
  color: #fff;
  letter-spacing: .2px;
  text-shadow: 0 1px 4px rgba(0,0,0,.25);
}

/* Sous-titre */
.scr0 .subtitle {
  flex-shrink: 0;
  text-align: center;
  font-weight: 700;
  font-size: 11.5px;
  color: rgba(255,255,255,.85);
  padding: 0 20px 10px;
  letter-spacing: .1px;
}

/* Grille principale (scrollable) */
.scr0 .scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px;
  scrollbar-width: none;
}
.scr0 .scroll-area::-webkit-scrollbar { display: none; }

/* Grille 7 jours */
.scr0 .day-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding-bottom: 6px;
}

/* Cellule générique */
.scr0 .day-cell {
  border-radius: 16px;
  padding: 10px 6px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: relative;
  min-height: 76px;
}

/* État récupéré (grisé) */
.scr0 .day-cell.done {
  background: rgba(255,255,255,.10);
  border: 1.5px solid rgba(255,255,255,.18);
  opacity: .72;
}

.scr0 .day-cell.done .day-label {
  color: rgba(255,255,255,.6);
}

.scr0 .day-cell.done .day-reward {
  color: rgba(255,255,255,.55);
}

/* Check badge */
.scr0 .check-badge {
  position: absolute;
  top: -5px; right: -5px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #4CAF50;
  border: 2px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  color: #fff;
  font-weight: 900;
}

/* Aujourd'hui */
.scr0 .day-cell.today {
  background: rgba(255,194,51,.15);
  border: 2.5px solid #FFC233;
  box-shadow: 0 0 14px rgba(255,194,51,.45), inset 0 1px 0 rgba(255,255,255,.18);
  min-height: 88px;
}

.scr0 .day-cell.today .day-label {
  color: #FFC233;
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.scr0 .day-cell.today .day-emoji {
  font-size: 22px;
}

.scr0 .day-cell.today .day-reward {
  color: #fff;
  font-size: 13px;
  font-weight: 900;
}

/* Bouton récupérer */
.scr0 .btn-collect {
  margin-top: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  background: linear-gradient(160deg, #FFD15C 0%, #FFC233 55%, #E8A91E 100%);
  color: #0F478C;
  font-weight: 900;
  font-size: 10px;
  border: none;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(232,169,30,.55);
  letter-spacing: .2px;
}

/* Verrouillé */
.scr0 .day-cell.locked {
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.12);
}

.scr0 .day-cell.locked .day-label {
  color: rgba(255,255,255,.45);
}

.scr0 .day-cell.locked .day-reward {
  color: rgba(255,255,255,.4);
}

.scr0 .day-cell.locked .day-emoji {
  filter: grayscale(60%) opacity(.5);
}

.scr0 .lock-icon {
  font-size: 12px;
  opacity: .5;
  margin-top: 1px;
}

/* Jackpot — pleine largeur */
.scr0 .day-cell.jackpot {
  grid-column: 1 / -1;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  min-height: 68px;
  background: linear-gradient(120deg, rgba(255,214,0,.10) 0%, rgba(124,108,240,.18) 100%);
  border: 2px solid rgba(255,214,0,.45);
  box-shadow: 0 0 18px rgba(255,214,0,.18);
  overflow: hidden;
}

.scr0 .jackpot-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.scr0 .jackpot-label {
  font-weight: 900;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: #FFD600;
}

.scr0 .jackpot-title {
  font-weight: 900;
  font-size: 13px;
  color: #fff;
}

.scr0 .jackpot-sub {
  font-weight: 700;
  font-size: 11px;
  color: rgba(255,255,255,.7);
}

.scr0 .jackpot-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.scr0 .jackpot-emoji {
  font-size: 28px;
  filter: drop-shadow(0 0 6px rgba(255,214,0,.7));
  animation: pulse_scr0 2s ease-in-out infinite;
}

.scr0 .jackpot-lock {
  font-size: 11px;
  opacity: .45;
  color: #fff;
}

/* Sparkles jackpot */
.scr0 .jackpot-sparkle {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  border-radius: 14px;
}

.scr0 .spark {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #FFD600;
  opacity: 0;
  animation: sparkle_scr0 3s ease-in-out infinite;
}
.scr0 .spark:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
.scr0 .spark:nth-child(2) { top: 60%; left: 35%; animation-delay: .6s; }
.scr0 .spark:nth-child(3) { top: 30%; left: 75%; animation-delay: 1.2s; }
.scr0 .spark:nth-child(4) { top: 70%; left: 85%; animation-delay: 1.8s; }
.scr0 .spark:nth-child(5) { top: 50%; left: 55%; animation-delay: 2.4s; }

@keyframes sparkle_scr0 {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: .9; transform: scale(1.4); }
}

@keyframes pulse_scr0 {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* Labels communs */
.scr0 .day-label {
  font-weight: 800;
  font-size: 9.5px;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
  letter-spacing: .4px;
}

.scr0 .day-emoji {
  font-size: 18px;
  line-height: 1;
}

.scr0 .day-reward {
  font-weight: 800;
  font-size: 11px;
  color: #fff;
  text-align: center;
  line-height: 1.2;
}

/* Bandeau bas "prochain cadeau" */
.scr0 .next-reward-bar {
  flex-shrink: 0;
  margin: 8px 12px 10px;
  padding: 10px 16px;
  border-radius: 20px;
  background: rgba(255,255,255,.13);
  border: 1.5px solid rgba(255,255,255,.25);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.scr0 .next-reward-bar span.nr-icon {
  font-size: 16px;
}

.scr0 .next-reward-bar span.nr-text {
  font-weight: 800;
  font-size: 12px;
  color: #fff;
  letter-spacing: .1px;
}

.scr0 .next-reward-bar span.nr-time {
  font-weight: 900;
  font-size: 13px;
  color: #FFC233;
}
</style>

<figure class="ph">
  <div class="screen">

    <!-- Encoche simulée via ::before -->

    <!-- Barre de retour -->
    <div class="topbar">
      <div class="topbar-back">‹</div>
      <span class="topbar-title">Cadeaux de connexion</span>
    </div>

    <!-- Sous-titre -->
    <p class="subtitle">Reviens chaque jour pour ta récompense&nbsp;!</p>

    <!-- Grille 7 jours -->
    <div class="scroll-area">
      <div class="day-grid">

        <!-- Jour 1 — récupéré -->
        <div class="day-cell done">
          <div class="check-badge">✓</div>
          <span class="day-label">Jour 1</span>
          <span class="day-emoji">😊</span>
          <span class="day-reward">+20 😊</span>
        </div>

        <!-- Jour 2 — récupéré -->
        <div class="day-cell done">
          <div class="check-badge">✓</div>
          <span class="day-label">Jour 2</span>
          <span class="day-emoji">🃏</span>
          <span class="day-reward">Dos de carte</span>
        </div>

        <!-- Jour 3 — récupéré -->
        <div class="day-cell done">
          <div class="check-badge">✓</div>
          <span class="day-label">Jour 3</span>
          <span class="day-emoji">😊</span>
          <span class="day-reward">+50 😊</span>
        </div>

        <!-- Jour 4 — récupéré -->
        <div class="day-cell done">
          <div class="check-badge">✓</div>
          <span class="day-label">Jour 4</span>
          <span class="day-emoji">🙂</span>
          <span class="day-reward">Avatar</span>
        </div>

        <!-- Jour 5 — AUJOURD'HUI -->
        <div class="day-cell today">
          <span class="day-label">Aujourd'hui</span>
          <span class="day-emoji">😊</span>
          <span class="day-reward">+100 😊</span>
          <button class="btn-collect">Récupérer</button>
        </div>

        <!-- Jour 6 — verrouillé -->
        <div class="day-cell locked">
          <span class="day-label">Jour 6</span>
          <span class="day-emoji">⭐</span>
          <span class="day-reward">Cadre</span>
          <span class="lock-icon">🔒</span>
        </div>

        <!-- Jour 7 — Jackpot pleine largeur -->
        <div class="day-cell jackpot">
          <div class="jackpot-sparkle">
            <div class="spark"></div>
            <div class="spark"></div>
            <div class="spark"></div>
            <div class="spark"></div>
            <div class="spark"></div>
          </div>
          <div class="jackpot-left">
            <span class="jackpot-label">✨ Jour 7 — Jackpot</span>
            <span class="jackpot-title">Bannière exclusive</span>
            <span class="jackpot-sub">+ 200 😊 bonus</span>
          </div>
          <div class="jackpot-right">
            <span class="jackpot-emoji">🏆</span>
            <span class="jackpot-lock">🔒 verrouillé</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Bandeau "prochain cadeau" -->
    <div class="next-reward-bar">
      <span class="nr-icon">⏰</span>
      <span class="nr-text">Prochain cadeau dans</span>
      <span class="nr-time">18 h 12 m</span>
    </div>

  </div>
  <figcaption>Cadeaux de connexion</figcaption>
</figure>
</div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
