<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;padding:18px;display:flex;justify-content:center;background:transparent">
<div class="scr7">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    .scr7 * { box-sizing: border-box; margin: 0; padding: 0; }

    .scr7 .ph {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      font-family: 'Nunito', sans-serif;
    }

    .scr7 .ph figcaption {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #555;
    }

    .scr7 .screen {
      width: 300px;
      height: 640px;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 50% 42%, #1A6FC0 0%, rgba(26,111,192,0) 34%),
        repeating-conic-gradient(from -90deg at 50% 42%, #52A6E0 0deg 11.25deg, #0F478C 11.25deg 22.5deg),
        #0F478C;
      font-family: 'Nunito', sans-serif;
    }

    .scr7 .screen::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      z-index: 100;
    }

    /* Top bar */
    .scr7 .top-bar {
      display: flex;
      align-items: center;
      padding: 28px 16px 10px;
      gap: 8px;
      flex-shrink: 0;
    }

    .scr7 .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: 20px;
      padding: 5px 12px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      backdrop-filter: blur(6px);
      cursor: pointer;
    }

    .scr7 .top-title {
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      flex: 1;
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    .scr7 .top-spacer {
      width: 60px;
    }

    /* Grid area */
    .scr7 .grid-area {
      flex: 1;
      padding: 6px 14px 10px;
      overflow: hidden;
      position: relative;
    }

    .scr7 .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .scr7 .card-thumb {
      background: rgba(255,255,255,0.14);
      border: 1.5px solid rgba(255,255,255,0.30);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 6px 8px;
      gap: 5px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: transform 0.15s;
    }

    .scr7 .card-thumb.active {
      background: rgba(255,255,255,0.28);
      border-color: #FFC233;
      box-shadow: 0 0 0 2px #FFC233, 0 4px 16px rgba(0,0,0,0.18);
    }

    .scr7 .card-thumb .thumb-emoji {
      font-size: 28px;
      line-height: 1;
    }

    .scr7 .card-thumb .thumb-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 10px;
      color: #fff;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      line-height: 1.2;
    }

    /* Detail sheet overlay */
    .scr7 .detail-overlay {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 6px;
      background: #FFF8EE;
      border-radius: 22px;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.28), 0 2px 12px rgba(0,0,0,0.12);
      padding: 0 0 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .scr7 .detail-header {
      background: #3498DB;
      border-radius: 20px 20px 0 0;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .scr7 .detail-big-emoji {
      font-size: 40px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .scr7 .detail-header-text {
      flex: 1;
    }

    .scr7 .detail-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 20px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
      line-height: 1;
    }

    .scr7 .detail-cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.40);
      border-radius: 20px;
      padding: 2px 10px;
      margin-top: 4px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 11px;
      color: #fff;
    }

    .scr7 .detail-qty {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 20px;
      color: #FFC233;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      flex-shrink: 0;
    }

    /* Meta rows */
    .scr7 .detail-body {
      padding: 12px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .scr7 .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(52,152,219,0.08);
      border-radius: 10px;
      padding: 6px 10px;
    }

    .scr7 .meta-row .meta-icon {
      font-size: 15px;
      line-height: 1;
      width: 18px;
      text-align: center;
    }

    .scr7 .meta-row .meta-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 12px;
      color: #0F478C;
      flex: 1;
    }

    .scr7 .meta-row .meta-value {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 14px;
      color: #0F478C;
    }

    /* Divider */
    .scr7 .detail-divider {
      height: 1px;
      background: rgba(52,152,219,0.18);
      margin: 10px 16px 0;
    }

    /* Effect */
    .scr7 .detail-effect {
      padding: 10px 16px 0;
    }

    .scr7 .effect-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: #222;
      line-height: 1.5;
    }

    .scr7 .effect-note {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 7px;
      background: rgba(124,108,240,0.12);
      border-radius: 10px;
      padding: 3px 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 11px;
      color: #7C6CF0;
    }

    /* Close handle */
    .scr7 .detail-handle {
      width: 36px;
      height: 4px;
      background: rgba(15,71,140,0.18);
      border-radius: 2px;
      margin: 0 auto 10px;
      flex-shrink: 0;
    }
  </style>

  <figure class="ph">
    <div class="screen">

      <!-- Top bar -->
      <div class="top-bar">
        <div class="back-btn">‹ Métiers</div>
        <div class="top-title">Métiers</div>
        <div class="top-spacer"></div>
      </div>

      <!-- Card grid area -->
      <div class="grid-area">
        <div class="card-grid">
          <div class="card-thumb">
            <div class="thumb-emoji">🔬</div>
            <div class="thumb-name">Chercheur</div>
          </div>
          <div class="card-thumb">
            <div class="thumb-emoji">📰</div>
            <div class="thumb-name">Journaliste</div>
          </div>
          <div class="card-thumb active">
            <div class="thumb-emoji">🔮</div>
            <div class="thumb-name">Médium</div>
          </div>
          <div class="card-thumb">
            <div class="thumb-emoji">⚖️</div>
            <div class="thumb-name">Avocat</div>
          </div>
          <div class="card-thumb">
            <div class="thumb-emoji">🚒</div>
            <div class="thumb-name">Pompier</div>
          </div>
          <div class="card-thumb">
            <div class="thumb-emoji">✈️</div>
            <div class="thumb-name">Pilote</div>
          </div>
        </div>

        <!-- Detail sheet overlay -->
        <div class="detail-overlay">
          <div class="detail-handle"></div>
          <div class="detail-header">
            <div class="detail-big-emoji">🔮</div>
            <div class="detail-header-text">
              <div class="detail-name">Médium</div>
              <div class="detail-cat-pill">Métier</div>
            </div>
            <div class="detail-qty">×1</div>
          </div>

          <div class="detail-body">
            <div class="meta-row">
              <span class="meta-icon">🎓</span>
              <span class="meta-label">Études</span>
              <span class="meta-value">0</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">💵</span>
              <span class="meta-label">Salaire</span>
              <span class="meta-value">1</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">😊</span>
              <span class="meta-label">Smiles</span>
              <span class="meta-value">2</span>
            </div>
          </div>

          <div class="detail-divider"></div>

          <div class="detail-effect">
            <div class="effect-text">Peut voir les 13 premières cartes de la pioche.</div>
            <div class="effect-note">⚡ Instantané.</div>
          </div>
        </div>
      </div>

    </div>
    <figcaption>Encyclopédie — Fiche</figcaption>
  </figure>
</div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
