<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;padding:18px;display:flex;justify-content:center;background:transparent">
<div class="scr2">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    .scr2 * { box-sizing: border-box; margin: 0; padding: 0; }

    .scr2 figure.ph {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      font-family: 'Nunito', sans-serif;
    }

    .scr2 figcaption {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #555;
    }

    .scr2 .screen {
      width: 300px;
      height: 640px;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 50% 42%, #1A6FC0 0%, rgba(26,111,192,0) 34%),
        repeating-conic-gradient(from -90deg at 50% 42%, #52A6E0 0deg 11.25deg, #0F478C 11.25deg 22.5deg),
        #0F478C;
      font-family: 'Nunito', sans-serif;
    }

    .scr2 .screen::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 20px;
      background: rgba(0,0,0,0.35);
      border-radius: 20px;
      z-index: 100;
    }

    /* ── Header ── */
    .scr2 .ms-header {
      padding: 38px 18px 10px;
      text-align: center;
      flex-shrink: 0;
    }

    .scr2 .ms-header h1 {
      font-size: 20px;
      font-weight: 900;
      color: #FFF8EE;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      letter-spacing: 0.2px;
      line-height: 1.15;
    }

    .scr2 .ms-header p {
      font-size: 10.5px;
      font-weight: 700;
      color: rgba(255,248,238,0.78);
      margin-top: 2px;
    }

    /* ── Scroll area ── */
    .scr2 .ms-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: none;
    }
    .scr2 .ms-scroll::-webkit-scrollbar { display: none; }

    /* ── Section label ── */
    .scr2 .ms-section-label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 2px;
    }

    .scr2 .ms-section-label span.ms-sl-title {
      font-size: 10px;
      font-weight: 800;
      color: #FFC233;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .scr2 .ms-section-label span.ms-sl-reset {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,248,238,0.55);
    }

    .scr2 .ms-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    /* ── Mission card (glass) ── */
    .scr2 .ms-card {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: 16px;
      padding: 9px 11px 9px 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      position: relative;
      transition: opacity 0.2s;
    }

    /* Done state */
    .scr2 .ms-card.ms-done {
      opacity: 0.55;
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    /* Icon bubble */
    .scr2 .ms-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .scr2 .ms-done .ms-icon {
      background: rgba(255,255,255,0.10);
      font-size: 22px;
    }

    /* Body */
    .scr2 .ms-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .scr2 .ms-title {
      font-size: 11.5px;
      font-weight: 800;
      color: #FFF8EE;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scr2 .ms-done .ms-title {
      color: rgba(255,248,238,0.65);
      text-decoration: line-through;
    }

    /* Progress bar */
    .scr2 .ms-prog-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .scr2 .ms-bar-bg {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.18);
      border-radius: 99px;
      overflow: hidden;
    }

    .scr2 .ms-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #FFD15C, #FFC233);
      box-shadow: 0 0 4px rgba(255,194,51,0.5);
      transition: width 0.4s ease;
    }

    .scr2 .ms-bar-fill.ms-full {
      background: linear-gradient(90deg, #4CAF50, #2ecc71);
    }

    .scr2 .ms-prog-text {
      font-size: 9px;
      font-weight: 800;
      color: rgba(255,248,238,0.65);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Reward badge */
    .scr2 .ms-reward {
      background: linear-gradient(135deg, #FFD15C, #FFC233, #E8A91E);
      color: #0F478C;
      font-size: 9.5px;
      font-weight: 900;
      border-radius: 99px;
      padding: 2px 7px;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(255,194,51,0.4);
      align-self: center;
    }

    /* Done checkmark overlay replacing reward */
    .scr2 .ms-check {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4CAF50, #2ecc71);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(76,175,80,0.5);
    }

    /* ── Bottom Nav ── */
    .scr2 .ms-nav {
      flex-shrink: 0;
      height: 62px;
      background: #FFF8EE;
      border-radius: 0 0 44px 44px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 6px 6px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.12);
    }

    .scr2 .ms-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      flex: 1;
      cursor: pointer;
      opacity: 0.45;
    }

    .scr2 .ms-nav-item.ms-active {
      opacity: 1;
    }

    .scr2 .ms-nav-item .ms-nav-icon {
      font-size: 18px;
      line-height: 1;
    }

    .scr2 .ms-nav-item .ms-nav-label {
      font-size: 8px;
      font-weight: 800;
      color: #0F478C;
      letter-spacing: 0.1px;
    }

    .scr2 .ms-active .ms-nav-label {
      color: #E8A91E;
    }

    .scr2 .ms-active .ms-nav-icon {
      filter: drop-shadow(0 0 3px rgba(255,194,51,0.6));
    }

    /* FAB play button */
    .scr2 .ms-nav-fab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      flex: 1;
      cursor: pointer;
      position: relative;
    }

    .scr2 .ms-nav-fab .ms-fab-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(145deg, #FFD15C, #FFC233, #E8A91E);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(255,194,51,0.5), 0 2px 4px rgba(0,0,0,0.15);
      margin-top: -18px;
      border: 3px solid #FFF8EE;
    }

    .scr2 .ms-nav-fab .ms-nav-label {
      font-size: 8px;
      font-weight: 800;
      color: #0F478C;
      letter-spacing: 0.1px;
      margin-top: 1px;
    }
  </style>

  <figure class="ph">
    <div class="screen">

      <!-- Header -->
      <div class="ms-header">
        <h1>Missions 🎯</h1>
        <p>Joue, progresse, gagne des Smiles</p>
      </div>

      <!-- Scrollable content -->
      <div class="ms-scroll">

        <!-- Section Journalières -->
        <div class="ms-section-label">
          <span class="ms-sl-title">Journalières</span>
          <span class="ms-sl-reset">reset dans 6 h</span>
        </div>

        <!-- Card 1 : Done -->
        <div class="ms-card ms-done">
          <div class="ms-icon">🃏</div>
          <div class="ms-body">
            <div class="ms-title">Joue 3 parties</div>
            <div class="ms-prog-row">
              <div class="ms-bar-bg">
                <div class="ms-bar-fill ms-full" style="width:100%"></div>
              </div>
              <div class="ms-prog-text">3/3</div>
            </div>
          </div>
          <div class="ms-check">✓</div>
        </div>

        <!-- Card 2 : 0/1 -->
        <div class="ms-card">
          <div class="ms-icon">🏆</div>
          <div class="ms-body">
            <div class="ms-title">Gagne 1 partie</div>
            <div class="ms-prog-row">
              <div class="ms-bar-bg">
                <div class="ms-bar-fill" style="width:0%"></div>
              </div>
              <div class="ms-prog-text">0/1</div>
            </div>
          </div>
          <div class="ms-reward">+50 😊</div>
        </div>

        <!-- Card 3 : 3/5 -->
        <div class="ms-card">
          <div class="ms-icon">💼</div>
          <div class="ms-body">
            <div class="ms-title">Pose 5 cartes Métier</div>
            <div class="ms-prog-row">
              <div class="ms-bar-bg">
                <div class="ms-bar-fill" style="width:60%"></div>
              </div>
              <div class="ms-prog-text">3/5</div>
            </div>
          </div>
          <div class="ms-reward">+20 😊</div>
        </div>

        <!-- Section Hebdomadaires -->
        <div class="ms-section-label" style="margin-top:4px;">
          <span class="ms-sl-title">Hebdomadaires</span>
          <span class="ms-sl-reset">reset lundi</span>
        </div>

        <!-- Card 4 : 7/15 -->
        <div class="ms-card">
          <div class="ms-icon">📅</div>
          <div class="ms-body">
            <div class="ms-title">Joue 15 parties</div>
            <div class="ms-prog-row">
              <div class="ms-bar-bg">
                <div class="ms-bar-fill" style="width:46.6%"></div>
              </div>
              <div class="ms-prog-text">7/15</div>
            </div>
          </div>
          <div class="ms-reward">+150 😊</div>
        </div>

        <!-- Card 5 : 2/5 -->
        <div class="ms-card">
          <div class="ms-icon">⭐</div>
          <div class="ms-body">
            <div class="ms-title">Gagne 5 parties</div>
            <div class="ms-prog-row">
              <div class="ms-bar-bg">
                <div class="ms-bar-fill" style="width:40%"></div>
              </div>
              <div class="ms-prog-text">2/5</div>
            </div>
          </div>
          <div class="ms-reward">+250 😊</div>
        </div>

      </div><!-- /ms-scroll -->

      <!-- Bottom Nav -->
      <div class="ms-nav">
        <div class="ms-nav-item">
          <div class="ms-nav-icon">🏠</div>
          <div class="ms-nav-label">Accueil</div>
        </div>
        <div class="ms-nav-item">
          <div class="ms-nav-icon">👤</div>
          <div class="ms-nav-label">Profil</div>
        </div>
        <div class="ms-nav-fab">
          <div class="ms-fab-circle">▶</div>
          <div class="ms-nav-label">Jouer</div>
        </div>
        <div class="ms-nav-item ms-active">
          <div class="ms-nav-icon">🎯</div>
          <div class="ms-nav-label">Missions</div>
        </div>
        <div class="ms-nav-item">
          <div class="ms-nav-icon">🛍️</div>
          <div class="ms-nav-label">Boutique</div>
        </div>
      </div>

    </div><!-- /screen -->
    <figcaption>Missions</figcaption>
  </figure>
</div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
