<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;padding:18px;display:flex;justify-content:center;background:transparent">
<div class="scr5"><style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

.scr5 * { box-sizing: border-box; margin: 0; padding: 0; }

.scr5 .ph {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  font-family: 'Nunito', sans-serif;
}

.scr5 figcaption {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: #555;
  letter-spacing: .5px;
}

.scr5 .screen {
  width: 300px;
  height: 640px;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(circle at 50% 42%, #1A6FC0 0%, rgba(26,111,192,0) 34%),
    repeating-conic-gradient(from -90deg at 50% 42%, #52A6E0 0deg 11.25deg, #0F478C 11.25deg 22.5deg),
    #0F478C;
  box-shadow: 0 12px 48px rgba(15,71,140,.45), 0 2px 8px rgba(0,0,0,.25);
}

/* Encoche */
.scr5 .screen::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 90px; height: 22px;
  background: #0a2f66;
  border-radius: 0 0 16px 16px;
  z-index: 20;
}

/* ── Barre de retour ── */
.scr5 .topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 28px 16px 10px;
  background: rgba(255,255,255,.10);
  border-bottom: 1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(6px);
}

.scr5 .topbar .back-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,.20);
  color: #fff;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  flex-shrink: 0;
}

.scr5 .topbar .bar-title {
  font-weight: 900;
  font-size: 16px;
  color: #fff;
  letter-spacing: .3px;
  flex: 1;
}

/* ── Zone scrollable centrale ── */
.scr5 .scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: none;
}
.scr5 .scroll-area::-webkit-scrollbar { display: none; }

/* Section label */
.scr5 .section-label {
  font-size: 10px;
  font-weight: 800;
  color: rgba(255,255,255,.6);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 4px 4px 2px;
}

/* Panneau clair pour un groupe */
.scr5 .panel {
  background: #FFF8EE;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}

/* Ligne de réglage */
.scr5 .row {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 10px;
  min-height: 44px;
  position: relative;
}

.scr5 .row + .row {
  border-top: 1px solid rgba(0,0,0,.06);
}

.scr5 .row-icon {
  font-size: 18px;
  flex-shrink: 0;
  width: 24px;
  text-align: center;
}

.scr5 .row-label {
  flex: 1;
  font-size: 13px;
  font-weight: 800;
  color: #1a1a2e;
}

/* Toggle switch */
.scr5 .toggle {
  width: 40px;
  height: 22px;
  border-radius: 11px;
  position: relative;
  flex-shrink: 0;
  cursor: pointer;
}

.scr5 .toggle.on {
  background: linear-gradient(135deg, #FFD15C, #FFC233, #E8A91E);
  box-shadow: 0 2px 6px rgba(255,194,51,.4);
}

.scr5 .toggle.off {
  background: #ccc;
}

.scr5 .toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: left .2s;
}

.scr5 .toggle.on::after { left: calc(100% - 19px); }
.scr5 .toggle.off::after { left: 3px; }

/* Valeur + chevron */
.scr5 .row-value {
  font-size: 12px;
  font-weight: 700;
  color: #0F478C;
  display: flex;
  align-items: center;
  gap: 2px;
}

.scr5 .chevron {
  font-size: 11px;
  color: #aaa;
  font-weight: 900;
}

/* Ligne lien */
.scr5 .row-link .row-label {
  color: #0F478C;
}

/* Bouton déconnexion */
.scr5 .btn-logout {
  margin: 4px 0 2px;
  padding: 11px 14px;
  background: rgba(255,255,255,.12);
  border: 1.5px solid rgba(255,255,255,.28);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  backdrop-filter: blur(4px);
}

.scr5 .btn-logout span {
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: rgba(255,255,255,.75);
  letter-spacing: .2px;
}

.scr5 .btn-logout .logout-icon {
  font-size: 15px;
}

/* Nav basse */
.scr5 .nav {
  flex-shrink: 0;
  background: #FFF8EE;
  display: flex;
  align-items: center;
  height: 58px;
  padding: 0 4px 4px;
  border-top: 1px solid rgba(0,0,0,.08);
  box-shadow: 0 -2px 8px rgba(0,0,0,.08);
}

.scr5 .nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
}

.scr5 .nav-item .nav-icon { font-size: 18px; }
.scr5 .nav-item .nav-lbl {
  font-size: 9px;
  font-weight: 800;
  color: #aaa;
  letter-spacing: .3px;
}
.scr5 .nav-item.active .nav-lbl { color: #FFC233; }

/* FAB central */
.scr5 .nav-fab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
}

.scr5 .fab-circle {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(145deg, #FFD15C, #FFC233, #E8A91E);
  box-shadow: 0 4px 14px rgba(255,194,51,.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-top: -18px;
}

.scr5 .fab-lbl {
  font-size: 9px;
  font-weight: 800;
  color: #aaa;
  margin-top: 2px;
}

/* Spacer en bas de scroll */
.scr5 .scroll-bottom-pad {
  height: 4px;
  flex-shrink: 0;
}
</style>

<figure class="ph">
  <div class="screen">

    <!-- Encoche simulée via ::before -->

    <!-- Barre de retour -->
    <div class="topbar">
      <div class="back-btn">‹</div>
      <div class="bar-title">Paramètres ⚙️</div>
    </div>

    <!-- Zone scrollable -->
    <div class="scroll-area">

      <!-- Son / Musique / Vibrations -->
      <div class="section-label">Audio &amp; Retours</div>
      <div class="panel">
        <div class="row">
          <span class="row-icon">🔊</span>
          <span class="row-label">Son</span>
          <div class="toggle on"></div>
        </div>
        <div class="row">
          <span class="row-icon">🎵</span>
          <span class="row-label">Musique</span>
          <div class="toggle on"></div>
        </div>
        <div class="row">
          <span class="row-icon">📳</span>
          <span class="row-label">Vibrations</span>
          <div class="toggle off"></div>
        </div>
      </div>

      <!-- Langue / Graphique -->
      <div class="section-label">Affichage</div>
      <div class="panel">
        <div class="row">
          <span class="row-icon">🌐</span>
          <span class="row-label">Langue</span>
          <span class="row-value">Français <span class="chevron">›</span></span>
        </div>
        <div class="row">
          <span class="row-icon">✨</span>
          <span class="row-label">Qualité graphique</span>
          <span class="row-value">Élevée <span class="chevron">›</span></span>
        </div>
      </div>

      <!-- Notifications -->
      <div class="section-label">Notifications</div>
      <div class="panel">
        <div class="row">
          <span class="row-icon">🔔</span>
          <span class="row-label">Notifications</span>
          <div class="toggle on"></div>
        </div>
      </div>

      <!-- Liens légaux / infos -->
      <div class="section-label">Informations</div>
      <div class="panel">
        <div class="row row-link">
          <span class="row-icon">🔒</span>
          <span class="row-label">Confidentialité</span>
          <span class="chevron">›</span>
        </div>
        <div class="row row-link">
          <span class="row-icon">📄</span>
          <span class="row-label">Conditions d'utilisation</span>
          <span class="chevron">›</span>
        </div>
        <div class="row row-link">
          <span class="row-icon">ℹ️</span>
          <span class="row-label">À propos</span>
          <span class="chevron">›</span>
        </div>
      </div>

      <!-- Déconnexion -->
      <div class="btn-logout">
        <span class="logout-icon">🚪</span>
        <span>Se déconnecter</span>
      </div>

      <div class="scroll-bottom-pad"></div>
    </div>

    <!-- Nav basse -->
    <nav class="nav">
      <div class="nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-lbl">Accueil</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">👤</span>
        <span class="nav-lbl">Profil</span>
      </div>
      <div class="nav-fab">
        <div class="fab-circle">▶</div>
        <span class="fab-lbl">Jouer</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">🎯</span>
        <span class="nav-lbl">Missions</span>
      </div>
      <div class="nav-item active">
        <span class="nav-icon">🛍️</span>
        <span class="nav-lbl">Boutique</span>
      </div>
    </nav>

  </div>
  <figcaption>Paramètres</figcaption>
</figure></div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
