<!DOCTYPE html>

<div class="scr9"><style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

.scr9 * { box-sizing: border-box; margin: 0; padding: 0; }

.scr9 .ph {

  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.scr9 .medals-grid {
  display: grid;

  gap: 8px;
}

.scr9 .medal-card {
  display: flex;
  flex-direction: column;
  align-items: center;

.scr9 .medal-card.equipped-card {

}

.scr9 .medal-card.locked {

}

.scr9 .medal-emoji {

}

.scr9 .medal-name {

  text-align: center;

.scr9 .medal-btn {

  font-weight: 900;
  padding: 3px 7px;
  border-radius: 20px;

  cursor: pointer;
}

.scr9 .medal-btn.shown {

  color: #0F478C;
}

.scr9 .medal-btn.show {
  background: #E8F4FD;
  color: #0F478C;
  border: 1.5px solid #3498DB;
}

.scr9 .medal-btn.lock {
  background: #eee;
  color: #888;
  font-size: 7.5px;
  display: flex;
  align-items: center;
  gap: 2px;
}

.scr9 .medal-badge-new {

  top: -4px;
  right: -4px;
  background: #E53935;
  color: #fff;
  font-size: 7px;
  font-weight: 900;
  padding: 1px 4px;
  border-radius: 10px;
  border: 1.5px solid #fff;
}

.scr9 .medal-card.equipped-card .slot-tick {
  position: absolute;
  top: -4px;
  left: -4px;
  width: 16px;
  height: 16px;
  background: #FFC233;
  border-radius: 50%;
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid #fff;
}

/* Nav bas */
.scr9 .bottomnav {
  background: #FFF8EE;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 8px 8px 14px;
  flex-shrink: 0;
  border-top: 1px solid rgba(0,0,0,0.07);
}

.scr9 .nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;

.scr9 .nav-item .nav-icon { font-size: 18px; }

.scr9 .nav-item.active { color: #FFC233; }

.scr9 .nav-fab {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(145deg, #FFD15C, #FFC233, #E8A91E);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 14px rgba(255,194,51,0.55);
  margin-top: -10px;
  cursor: pointer;
}
</style>

<figure class="ph">
  <div class="screen">

    <!-- Barre retour -->
    <div class="topbar">
      <span class="topbar-back">‹</span>
      <span class="topbar-title">Personnalisation</span>
    </div>

    <!-- Onglets -->
    <div class="tabs">
      <div class="tab">Avatars</div>
      <div class="tab">Cadres</div>
      <div class="tab">Bannières</div>
      <div class="tab active">Médailles</div>
    </div>

    <!-- Corps scrollable -->
    <div class="main">

      <!-- Info -->
      <div class="info-band">
        <span class="info-icon">🏅</span>
        <span class="info-text">Affiche jusqu'à <strong>4 médailles</strong> sur ton profil pour montrer tes exploits !</span>
      </div>

      <!-- Aperçu équipées -->
      <div class="section-label">Aperçu — médailles équipées</div>
      <div class="equipped-row">
        <div class="slot filled">🥇<span class="slot-num">1</span></div>
        <div class="slot filled">🎯<span class="slot-num">2</span></div>

      </div>

      <!-- Grille -->
      <div class="medals-panel">
        <div class="section-label" style="color:#0F478C;">Mes médailles</div>
        <div class="medals-grid">

          <!-- Équipée 1 -->
          <div class="medal-card equipped-card">
            <span class="slot-tick">✓</span>

          </div>

          <!-- Équipée 2 -->
          <div class="medal-card equipped-card">

            <button class="medal-btn shown">✓ Affichée</button>
          </div>

          <!-- Équipée 3 -->
          <div class="medal-card equipped-card">
            <span class="slot-tick">✓</span>

  </div>

</figure>
</div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
