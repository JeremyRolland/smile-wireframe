<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;padding:18px;display:flex;justify-content:center;background:transparent">
<div class="scr1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    .scr1 * { box-sizing: border-box; margin: 0; padding: 0; }

    .scr1 {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: 'Nunito', sans-serif;
    }

    .scr1 .ph {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .scr1 .ph figcaption {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #555;
      letter-spacing: .5px;
    }

    .scr1 .screen {
      width: 300px;
      height: 640px;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 50% 42%, #1A6FC0 0%, rgba(26,111,192,0) 34%),
        repeating-conic-gradient(from -90deg at 50% 42%, #52A6E0 0deg 11.25deg, #0F478C 11.25deg 22.5deg),
        #0F478C;
      box-shadow: 0 24px 60px rgba(15,71,140,.45), 0 4px 16px rgba(0,0,0,.2);
    }

    /* Encoche */
    .scr1 .screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 22px;
      background: rgba(0,0,0,.55);
      border-radius: 0 0 16px 16px;
      z-index: 10;
    }

    /* Barre retour */
    .scr1 .topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 30px 16px 8px;
      flex-shrink: 0;
    }

    .scr1 .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.30);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 5px 12px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }

    .scr1 .back-arrow {
      font-size: 15px;
      line-height: 1;
    }

    /* Bandeau victoire */
    .scr1 .victory-banner {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 16px 10px;
      flex-shrink: 0;
    }

    .scr1 .crown {
      font-size: 46px;
      line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(255,194,51,.6));
      animation: crown-pulse_scr1 2s ease-in-out infinite;
    }

    @keyframes crown-pulse_scr1 {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.08) translateY(-3px); }
    }

    .scr1 .victory-title {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: .3px;
      text-shadow: 0 2px 8px rgba(0,0,0,.35);
      margin-top: 2px;
    }

    /* Classement */
    .scr1 .ranktab {
      margin: 0 12px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.30);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .scr1 .rank-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      position: relative;
    }

    .scr1 .rank-row + .rank-row {
      border-top: 1px solid rgba(255,255,255,.12);
    }

    .scr1 .rank-row.winner {
      background: rgba(255,194,51,.22);
    }

    .scr1 .rank-pos {
      font-size: 13px;
      font-weight: 900;
      color: rgba(255,255,255,.65);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .scr1 .rank-row.winner .rank-pos {
      color: #FFC233;
    }

    .scr1 .rank-avatar {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .scr1 .rank-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .scr1 .rank-name {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }

    .scr1 .rank-row.winner .rank-name {
      color: #FFD15C;
    }

    .scr1 .rank-badge {
      display: inline-block;
      background: rgba(255,255,255,.18);
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.75);
      padding: 1px 6px;
      width: fit-content;
    }

    .scr1 .rank-row.winner .rank-badge {
      background: rgba(255,194,51,.3);
      color: #FFE08A;
    }

    .scr1 .rank-score {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .scr1 .rank-row.winner .rank-score {
      color: #FFC233;
      font-size: 17px;
    }

    .scr1 .rank-smiley {
      font-size: 14px;
    }

    /* Zone boutons */
    .scr1 .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 14px 0;
      flex-shrink: 0;
    }

    /* Bouton principal jaune glossy */
    .scr1 .btn-primary {
      width: 100%;
      padding: 14px 16px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(180deg, #FFD15C 0%, #FFC233 50%, #E8A91E 100%);
      box-shadow:
        0 2px 0 #C47F00 inset,
        0 -1px 0 rgba(255,255,255,.4) inset,
        0 6px 20px rgba(255,194,51,.55);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #0F478C;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: .2px;
      text-shadow: 0 1px 0 rgba(255,255,255,.4);
      position: relative;
      overflow: hidden;
    }

    .scr1 .btn-primary::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 10%;
      width: 80%;
      height: 40%;
      background: rgba(255,255,255,.28);
      border-radius: 999px;
      pointer-events: none;
    }

    .scr1 .btn-primary .smiley-ico {
      font-size: 18px;
    }

    /* Bouton secondaire verre */
    .scr1 .btn-secondary {
      width: 100%;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.30);
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(8px);
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,.90);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-align: center;
      line-height: 1.3;
    }

    .scr1 .btn-secondary .pub-dot {
      display: inline-block;
      background: #FFC233;
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 900;
      color: #0F478C;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* Mention bas */
    .scr1 .footer-note {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.45);
      padding: 8px 16px 0;
      flex-shrink: 0;
    }

    /* Spacer */
    .scr1 .spacer { flex: 1; }
  </style>

  <figure class="ph">
    <div class="screen">

      <!-- Barre retour -->
      <div class="topbar">
        <div class="back-btn">
          <span class="back-arrow">‹</span>
          Résultat
        </div>
      </div>

      <!-- Bandeau victoire -->
      <div class="victory-banner">
        <div class="crown">👑</div>
        <div class="victory-title">Partie terminée !</div>
      </div>

      <!-- Classement -->
      <div class="ranktab">

        <!-- 1er — Toi (winner) -->
        <div class="rank-row winner">
          <div class="rank-pos">1</div>
          <div class="rank-avatar">🙂</div>
          <div class="rank-info">
            <div class="rank-name">Toi</div>
            <div class="rank-badge">🏆 Victoire</div>
          </div>
          <div class="rank-score">+90 <span class="rank-smiley">😊</span></div>
        </div>

        <!-- 2e — Léa -->
        <div class="rank-row">
          <div class="rank-pos">2</div>
          <div class="rank-avatar">😎</div>
          <div class="rank-info">
            <div class="rank-name">Léa</div>
          </div>
          <div class="rank-score">+55 <span class="rank-smiley">😊</span></div>
        </div>

        <!-- 3e — Hugo -->
        <div class="rank-row">
          <div class="rank-pos">3</div>
          <div class="rank-avatar">🤓</div>
          <div class="rank-info">
            <div class="rank-name">Hugo</div>
          </div>
          <div class="rank-score">+40 <span class="rank-smiley">😊</span></div>
        </div>

        <!-- 4e — Marc -->
        <div class="rank-row">
          <div class="rank-pos">4</div>
          <div class="rank-avatar">😴</div>
          <div class="rank-info">
            <div class="rank-name">Marc</div>
          </div>
          <div class="rank-score">+25 <span class="rank-smiley">😊</span></div>
        </div>

      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-primary">
          Récupérer 90 <span class="smiley-ico">😊</span>
        </button>
        <button class="btn-secondary">
          📺 Regarder une pub pour doubler (+90)
          <span class="pub-dot">5 restantes</span>
        </button>
      </div>

      <div class="footer-note">Vos 😊 seront crédités sur votre profil</div>

      <div class="spacer"></div>

    </div>
    <figcaption>Résultat</figcaption>
  </figure>
</div>

<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
