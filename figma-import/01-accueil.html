<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="margin:0;padding:18px;display:flex;justify-content:center;background:transparent">
<div class="scrA"><style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

.scrA * { box-sizing: border-box; margin: 0; padding: 0; }
.scrA { font-family: 'Nunito', sans-serif; display: inline-block; }
.scrA .ph { display: inline-block; margin: 0; }
.scrA .ph figcaption { text-align: center; margin-top: 8px; font-size: 13px; color: #555; font-weight: 700; }

.scrA .screen {
  width: 300px; height: 640px; border-radius: 44px; overflow: hidden; position: relative;
  display: flex; flex-direction: column;
  background:
    radial-gradient(circle at 50% 42%, #1A6FC0 0%, rgba(26,111,192,0) 34%),
    repeating-conic-gradient(from -90deg at 50% 42%, #52A6E0 0deg 11.25deg, #0F478C 11.25deg 22.5deg),
    #0F478C;
}
.scrA .screen::before { content:''; position:absolute; top:10px; left:50%; transform:translateX(-50%); width:80px; height:22px; background:rgba(0,0,0,.35); border-radius:0 0 14px 14px; z-index:10; }

/* top bar */
.scrA .top-bar { display:flex; align-items:center; justify-content:space-between; padding:38px 16px 6px; flex-shrink:0; }
.scrA .logo { font-size:16px; font-weight:900; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.3); }
.scrA .balance { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.35); border-radius:999px; padding:4px 10px; font-size:12px; font-weight:800; color:#FFC233; backdrop-filter:blur(6px); }

/* greeting */
.scrA .greeting { padding:2px 16px 8px; flex-shrink:0; }
.scrA .greeting h2 { font-size:17px; font-weight:900; color:#fff; line-height:1.15; }
.scrA .greeting p { font-size:10.5px; font-weight:700; color:rgba(255,255,255,.72); margin-top:1px; }

/* content */
.scrA .content { flex:1; min-height:0; padding:0 12px; display:flex; flex-direction:column; gap:8px; overflow:hidden; }

/* event card (highlight) */
.scrA .event {
  background: linear-gradient(145deg,#1a3d6b 0%,#0d2a4e 100%);
  border:1px solid rgba(255,204,51,.45); border-radius:16px; overflow:hidden; flex-shrink:0;
}
.scrA .event .e-banner { background:linear-gradient(90deg,#FFD15C,#FFC233,#E8A91E); color:#0F478C; font-size:9.5px; font-weight:900; padding:3px 11px; display:flex; align-items:center; justify-content:space-between; }
.scrA .event .e-live { background:#e8001e; color:#fff; font-size:8.5px; font-weight:900; padding:1px 6px; border-radius:999px; }
.scrA .event .e-body { display:flex; align-items:center; gap:10px; padding:9px 11px; }
.scrA .event .e-ico { font-size:26px; flex-shrink:0; }
.scrA .event .e-info { flex:1; min-width:0; }
.scrA .event .e-title { font-size:13px; font-weight:900; color:#fff; }
.scrA .event .e-sub { font-size:9.5px; font-weight:700; color:rgba(255,255,255,.72); }
.scrA .event .e-timer { font-size:9px; font-weight:800; color:#FFC233; margin-top:1px; }
.scrA .event .e-btn { flex-shrink:0; background:linear-gradient(135deg,#FFD15C,#FFC233,#E8A91E); color:#0F478C; font-size:11px; font-weight:900; border:none; border-radius:999px; padding:6px 13px; box-shadow:0 2px 8px rgba(232,169,30,.45); }

/* mini-cards grid 2x2 */
.scrA .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; flex-shrink:0; }
.scrA .mini { background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.28); border-radius:14px; padding:9px 10px; backdrop-filter:blur(6px); display:flex; flex-direction:column; gap:3px; min-height:0; }
.scrA .mini.light { background:#FFF8EE; border-color:rgba(255,194,51,.3); }
.scrA .mini .m-ico { font-size:18px; line-height:1; }
.scrA .mini .m-title { font-size:11px; font-weight:900; line-height:1.15; }
.scrA .mini .m-line { font-size:9px; font-weight:700; line-height:1.25; }
.scrA .mini.light .m-title { color:#0F478C; } .scrA .mini.light .m-line { color:#666; }
.scrA .mini .m-title { color:#fff; } .scrA .mini .m-line { color:rgba(255,255,255,.78); }
.scrA .mini .m-chip { font-size:9px; font-weight:900; color:#FFC233; }
.scrA .mini .m-strike { color:rgba(255,255,255,.45); text-decoration:line-through; }
/* mini progress */
.scrA .mbar { background:rgba(255,255,255,.22); border-radius:999px; height:5px; overflow:hidden; margin-top:1px; }
.scrA .mbar > i { display:block; height:100%; background:linear-gradient(90deg,#FFD15C,#FFC233); border-radius:999px; }

/* achievement compact */
.scrA .ach { background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.28); border-radius:14px; padding:8px 11px; backdrop-filter:blur(6px); flex-shrink:0; }
.scrA .ach .a-top { display:flex; align-items:center; justify-content:space-between; }
.scrA .ach .a-label { font-size:8.5px; font-weight:900; color:#FFC233; text-transform:uppercase; letter-spacing:.4px; }
.scrA .ach .a-rew { font-size:9px; font-weight:800; color:rgba(255,255,255,.85); }
.scrA .ach .a-title { font-size:11px; font-weight:900; color:#fff; margin:2px 0 4px; }
.scrA .ach .a-row { display:flex; align-items:center; gap:7px; }
.scrA .ach .a-bar { flex:1; background:rgba(255,255,255,.2); border-radius:999px; height:6px; overflow:hidden; }
.scrA .ach .a-bar > i { display:block; height:100%; background:linear-gradient(90deg,#FFD15C,#FFC233); border-radius:999px; }
.scrA .ach .a-count { font-size:9px; font-weight:800; color:rgba(255,255,255,.75); }

/* nav */
.scrA .nav-bar { flex-shrink:0; display:flex; align-items:flex-end; justify-content:space-around; background:rgba(10,32,72,.92); border-top:1px solid rgba(255,255,255,.12); padding:7px 10px 13px; margin-top:8px; }
.scrA .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; font-size:9px; font-weight:800; color:rgba(255,255,255,.45); min-width:40px; cursor:pointer; }
.scrA .nav-item .nav-icon { font-size:18px; }
.scrA .nav-item.active { color:#FFC233; }
.scrA .nav-fab { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; top:-10px; position:relative; }
.scrA .nav-fab .fab-circle { width:50px; height:50px; border-radius:50%; background:linear-gradient(145deg,#FFD15C,#FFC233,#E8A91E); display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 4px 16px rgba(232,169,30,.6); }
.scrA .nav-fab .fab-label { font-size:9px; font-weight:900; color:#FFC233; }
</style>
<figure class="ph scrA">
  <div class="screen">

    <div class="top-bar">
      <div class="logo">😊 Smile Life</div>
      <div class="balance">😊 2 450</div>
    </div>

    <div class="greeting">
      <h2>Salut Jérémy 👋</h2>
      <p>Prêt à remplir ta vie de smiles ?</p>
    </div>

    <div class="content">

      <!-- Événement en cours (vedette) -->
      <div class="event">
        <div class="e-banner"><span>✨ Événement en cours</span><span class="e-live">LIVE</span></div>
        <div class="e-body">
          <div class="e-ico">🎰</div>
          <div class="e-info">
            <div class="e-title">Week-end Casino</div>
            <div class="e-sub">Mise tes Smiles, bonus ×2 !</div>
            <div class="e-timer">⏱ 1 j 18 h restants</div>
          </div>
          <button class="e-btn">Jouer ▶</button>
        </div>
      </div>

      <!-- Mini-cartes -->
      <div class="grid2">
        <div class="mini">
          <div class="m-ico">🎯</div>
          <div class="m-title">Mission du jour</div>
          <div class="m-line">Joue 3 parties</div>
          <div class="mbar"><i style="width:33%"></i></div>
          <div class="m-chip">1 / 3 · +30 😊</div>
        </div>
        <div class="mini light">
          <div class="m-ico">🛍️</div>
          <div class="m-title">Offre −30 %</div>
          <div class="m-line">Dos Doré</div>
          <div class="m-chip" style="color:#E8A91E"><span class="m-strike" style="color:#bbb">2 000</span> → 1 400 😊</div>
        </div>
        <div class="mini light">
          <div class="m-ico">⭐</div>
          <div class="m-title">Note l'appli</div>
          <div class="m-line">Reçois un dos de carte offert 🎁</div>
        </div>
        <div class="mini">
          <div class="m-ico">📢</div>
          <div class="m-title">Quoi de neuf · v1.3</div>
          <div class="m-line">Nouveaux cadres &amp; corrections</div>
        </div>
      </div>

      <!-- Succès presque complété -->
      <div class="ach">
        <div class="a-top"><span class="a-label">🏆 Bientôt débloqué</span><span class="a-rew">🖼️ Cadre Bronze</span></div>
        <div class="a-title">Joueur assidu — Joue 100 parties</div>
        <div class="a-row"><div class="a-bar"><i style="width:84%"></i></div><span class="a-count">84 / 100</span></div>
      </div>

    </div>

    <div class="nav-bar">
      <div class="nav-item active"><span class="nav-icon">🏠</span><span>Accueil</span></div>
      <div class="nav-item"><span class="nav-icon">👤</span><span>Profil</span></div>
      <div class="nav-fab"><div class="fab-circle">▶</div><span class="fab-label">Jouer</span></div>
      <div class="nav-item"><span class="nav-icon">🎯</span><span>Missions</span></div>
      <div class="nav-item"><span class="nav-icon">🛍️</span><span>Boutique</span></div>
    </div>

  </div>
  <figcaption>Accueil</figcaption>
</figure></div>


<script>
(function(){
  var R={accueil:'01-accueil.html',partie:'02-partie.html',jouer:'03-jouer.html',resultat:'04-resultat.html',
    missions:'05-missions.html',cadeaux:'06-cadeaux.html',succes:'07-succes.html',profil:'08-profil.html',
    pavatars:'09-perso-avatars.html',pcadres:'10-perso-cadres.html',pbannieres:'11-perso-bannieres.html',
    pmedailles:'12-perso-medailles.html',boutique:'13-boutique.html',encyclo:'14-encyclopedie.html',
    fiche:'15-encyclopedie-fiche.html',parametres:'16-parametres.html'};
  function route(t){
    if(!t) return null; t=t.toLowerCase();
    if(t==='avatars') return R.pavatars;
    if(t==='cadres') return R.pcadres;
    if((t.indexOf('bannière')>-1||t.indexOf('banniere')>-1)&&t.length<14) return R.pbannieres;
    if(t==='médailles'||t==='medailles') return R.pmedailles;
    if(t.indexOf('personnalis')>-1) return R.pavatars;
    if(t.indexOf('encyclop')>-1) return R.encyclo;
    if(/\bjoueurs\b/.test(t)||t.indexOf('grande tablée')>-1||t.indexOf('duel')>-1||t.indexOf('trio')>-1) return R.partie;
    if(t.indexOf('jouer')>-1) return R.jouer;
    if(t.indexOf('paramètre')>-1||t.indexOf('parametre')>-1||t.indexOf('réglage')>-1) return R.parametres;
    if(t.indexOf('cadeau')>-1) return R.cadeaux;
    if(t.indexOf('succès')>-1||t.indexOf('bientôt débloqué')>-1||t.indexOf('assidu')>-1||t.indexOf('prouesse')>-1) return R.succes;
    if(t.indexOf('mission')>-1) return R.missions;
    if(t.indexOf('boutique')>-1||t.indexOf('acheter')>-1||t.indexOf('obtenir')>-1||t.indexOf('offre')>-1||t.indexOf('promo')>-1||t.indexOf('recharge')>-1) return R.boutique;
    if(t.indexOf('profil')>-1) return R.profil;
    if(t.indexOf('accueil')>-1) return R.accueil;
    return null;
  }
  document.addEventListener('click',function(e){
    var node=e.target, hops=0;
    while(node && !(node.classList&&node.classList.contains('screen')) && hops<5){
      var cls=(node.className&&node.className.baseVal!==undefined)?node.className.baseVal:(node.className||'');
      var tx=(node.textContent||'').trim();
      if((/back/i.test(''+cls))||tx==='‹'||tx==='←'){ e.preventDefault(); if(history.length>1) history.back(); else location.href=R.accueil; return; }
      var f=route(tx);
      if(f){ e.preventDefault(); location.href=f; return; }
      node=node.parentElement; hops++;
    }
  },true);
})();
</script>
</body></html>
